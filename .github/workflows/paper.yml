name: Build Paper PDF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build JOSS paper PDF
        uses: openjournals/joss-papers@main
        with:
          paper-path: paper.md

      - name: Upload generated PDF
        uses: actions/upload-artifact@v4
        with:
          name: joss-paper-pdf
          path: paper.pdf
